name: Release

on:
  push:
    tags:
      - "api-reference-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release version to publish, for example 1.2.3"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.metadata.outputs.commit }}
      ref: ${{ steps.release.outputs.ref }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out workflow revision
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install release tooling
        run: npm ci

      - name: Resolve release ref
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.ref_name }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${VERSION_INPUT}"
            ref="api-reference-v${version}"
          else
            ref="${RELEASE_TAG}"
            version="${ref#api-reference-v}"
          fi

          version="$(./node_modules/.bin/tsx scripts/release-version.ts "${version}")"

          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.ref }}

      - name: Read commit metadata
        id: metadata
        run: |
          echo "commit=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          echo "timestamp=$(git show --no-patch --format=%cI HEAD)" >> "${GITHUB_OUTPUT}"

  image:
    name: Publish container image
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: image-metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/groundsgg/api-reference
          tags: |
            type=raw,value=${{ needs.metadata.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.created=${{ needs.metadata.outputs.timestamp }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.commit }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=Grounds API Reference
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          platforms: linux/amd64
          provenance: mode=max
          push: true
          sbom: true
          tags: ${{ steps.image-metadata.outputs.tags }}
          labels: ${{ steps.image-metadata.outputs.labels }}
